name: Bug 报告
description: 报告可复现的缺陷或错误行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量填写完整，便于我们定位问题。**请勿在 Issue 中粘贴 API Key、密码等敏感信息。**

  - type: textarea
    id: summary
    attributes:
      label: 问题简述
      description: 用一两句话说明发生了什么。
      placeholder: 例如：点击「生成」后页面白屏 / 接口返回 500 …
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 按顺序列出操作步骤，直到问题出现。
      placeholder: |
        1. 进入 …
        2. 点击 …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确结果是什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际看到的结果是什么？（可附错误码、提示文案）
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: 部署 / 运行方式
      description: 你当前是如何运行 Jellyfish 的？
      options:
        - 本地开发（前后端分离）
        - Docker Compose（deploy/compose）
        - 其他（请在下方环境说明中补充）
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境说明
      description: 操作系统、浏览器（若涉及前端）、相关版本号等。
      placeholder: |
        - OS：macOS 14 / Windows 11 / …
        - 浏览器：Chrome 120（若与前端相关）
        - Jellyfish 分支或镜像 tag：…
    validations:
      required: true

  - type: dropdown
    id: model_provider
    attributes:
      label: 模型供应商
      description: 出现问题时是否调用了大模型？请选择供应商；若与模型无关请选择最后一项。
      options:
        - 未使用模型相关能力
        - OpenAI
        - Anthropic
        - 阿里云通义
        - 腾讯混元
        - 其他供应商（请在下方「模型名称」或日志中写明）
    validations:
      required: true

  - type: textarea
    id: model_name
    attributes:
      label: 模型名称
      description: 在 Jellyfish「模型管理」或接口中使用的具体模型标识（如 gpt-4o、claude-3-5-sonnet 等）。与模型无关可填「不适用」。
      placeholder: 例如：gpt-4o-mini / 或写「不适用」
    validations:
      required: true

  - type: dropdown
    id: custom_endpoint
    attributes:
      label: 是否使用自定义 API 基址（非官方默认 endpoint）
      description: 仅说明是否自定义，不要填写完整 URL 若含密钥。
      options:
        - 否（使用默认或 Jellyfish 内配置）
        - 是（兼容网关 / 自建代理等，请勿贴密钥）
        - 不涉及模型调用
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图（可选）
      description: 可粘贴脱敏后的后端日志、浏览器控制台报错，或说明截图位置。**不要包含 API Key。**
    validations:
      required: false

name: Create Release From Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release metadata
        id: meta
        run: |
          commit_subject="$(git log -1 --pretty=%s "$GITHUB_SHA")"
          previous_tag="$(git tag --sort=-creatordate | grep -Fxv "$GITHUB_REF_NAME" | head -n 1 || true)"
          {
            echo "commit_subject<<EOF"
            echo "$commit_subject"
            echo "EOF"
            echo "previous_tag=${previous_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Build categorized changelog
        id: changelog
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          PREVIOUS_TAG: ${{ steps.meta.outputs.previous_tag }}
          COMMIT_SUBJECT: ${{ steps.meta.outputs.commit_subject }}
        run: |
          python <<'PY'
          import os
          import subprocess

          current_tag = os.environ["CURRENT_TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "").strip()
          commit_subject = os.environ["COMMIT_SUBJECT"].strip()
          output_path = os.environ["GITHUB_OUTPUT"]

          if previous_tag:
            rev_range = f"{previous_tag}..{current_tag}"
          else:
            rev_range = current_tag

          raw_commits = subprocess.check_output(
            ["git", "log", "--format=%s", rev_range],
            text=True,
          ).splitlines()
          commits = [line.strip() for line in raw_commits if line.strip()]
          if not commits:
            commits = [commit_subject]

          features: list[str] = []
          bugfixes: list[str] = []
          improvements: list[str] = []

          for commit in commits:
            lowered = commit.lower().strip()
            item = f"- {commit.strip()}"
            if lowered.startswith("[feat]") or lowered.startswith("feat:"):
              features.append(item)
              continue
            if lowered.startswith("[fix]") or lowered.startswith("fix:"):
              bugfixes.append(item)
              continue
            if lowered.startswith("[perf]") or lowered.startswith("perf:"):
              improvements.append(item)
              continue
            if lowered.startswith("[refactor]") or lowered.startswith("refactor:"):
              improvements.append(item)
              continue
            if lowered.startswith("[docs]") or lowered.startswith("docs:"):
              improvements.append(item)
              continue
            if lowered.startswith("[style]") or lowered.startswith("style:"):
              improvements.append(item)
              continue
            if lowered.startswith("[test]") or lowered.startswith("test:"):
              improvements.append(item)
              continue
            if lowered.startswith("[ci]") or lowered.startswith("ci:"):
              improvements.append(item)
              continue
            if lowered.startswith("[build]") or lowered.startswith("build:"):
              improvements.append(item)
              continue
            if lowered.startswith("[chore]") or lowered.startswith("chore:"):
              improvements.append(item)
              continue
            improvements.append(item)

          def block(name: str, lines: list[str]) -> str:
            content = "\n".join(lines) if lines else "- 暂无"
            return f"{name}\n{content}"

          full_changelog = (
            f"https://github.com/{os.environ['GITHUB_REPOSITORY']}/compare/{previous_tag}...{current_tag}"
            if previous_tag
            else ""
          )

          with open(output_path, "a", encoding="utf-8") as fh:
            for key, value in {
              "features": block("New Features:", features),
              "improvements": block("Improvements:", improvements),
              "bugfixes": block("Bug Fixes:", bugfixes),
              "full_changelog": full_changelog,
            }.items():
              fh.write(f"{key}<<EOF\n{value}\nEOF\n")
          PY

      - name: Generate release notes
        id: notes
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = context.ref.replace("refs/tags/", "");
            const previousTag = `${{ steps.meta.outputs.previous_tag }}`.trim();
            const response = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha,
              previous_tag_name: previousTag || undefined,
            });
            core.setOutput("name", response.data.name || tagName);
            core.setOutput("body", response.data.body || "");

      - name: Build release body
        id: body
        env:
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SUBJECT: ${{ steps.meta.outputs.commit_subject }}
          FEATURES: ${{ steps.changelog.outputs.features }}
          IMPROVEMENTS: ${{ steps.changelog.outputs.improvements }}
          BUGFIXES: ${{ steps.changelog.outputs.bugfixes }}
          FULL_CHANGELOG: ${{ steps.changelog.outputs.full_changelog }}
          GENERATED_NOTES: ${{ steps.notes.outputs.body }}
        run: |
          cat <<EOF > release_body.md
          # ${TAG_NAME} Latest

          ## 发布摘要

          ${COMMIT_SUBJECT}

          ## Changelog

          ${FEATURES}

          ${IMPROVEMENTS}

          ${BUGFIXES}

          ## What's Changed

          ${GENERATED_NOTES}

          $(if [ -n "${FULL_CHANGELOG}" ]; then printf '\n## Full Changelog\n\n[%s](%s)\n' "${FULL_CHANGELOG##*/compare/}" "${FULL_CHANGELOG}"; fi)
          EOF
          {
            echo "path=release_body.md"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.notes.outputs.name || github.ref_name }}
          body_path: ${{ steps.body.outputs.path }}
          prerelease: ${{ contains(github.ref_name, '-') }}
